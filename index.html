    <noscript>

    <!-- Global Loader -->
    <div id="global-loader" class="fixed inset-0 z-[99999] flex items-center justify-center bg-white dark:bg-[#121c27] transition-opacity duration-700">
        <div class="relative flex flex-col items-center">

        </div>
    </div>
    <div style="position: absolute; top: 1rem; right: 1rem;">
        <button onclick="changeLanguage('es-MX')" style="cursor: pointer; padding: 5px;">ES</button>
        <button onclick="changeLanguage('en-US')" style="cursor: pointer; padding: 5px;">EN</button>
    </div>
    <h1 data-i18n="index_landing.title">Legado Ambiental</h1>
    <p data-i18n="index_landing.welcome">Bienvenido al proyecto de preservación ambiental.</p>
    <script src="assets/js/i18n.js"></script>
    <script>
        document.querySelectorAll('button[onclick]').forEach(btn => {
            btn.onclick = (e) => {
                const lang = e.target.textContent === 'ES' ? 'es-MX' : 'en-US';
                localStorage.setItem('preferredLanguage', lang);
                loadLanguage(lang);
            };
        });
    </script>
